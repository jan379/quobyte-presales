apiVersion: v1
items:
- apiVersion: v1
  kind: PersistentVolume
  metadata:
    labels:
      app.kubernetes.io/component: data
      app.kubernetes.io/name: quobyte-storage
      app.kubernetes.io/part-of: quobyte
      node: NODENAME
      role: data
    name: pv-NODENAME-data1
  spec:
    accessModes:
    - ReadWriteOnce
    capacity:
      storage: 300Gi
    local:
      path: /var/lib/quobyte/devices/data1
    nodeAffinity:
      required:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values:
            - NODENAME
    persistentVolumeReclaimPolicy: Retain
    storageClassName: quobyte-local
    volumeMode: Filesystem
kind: List
metadata:
  resourceVersion: ""
