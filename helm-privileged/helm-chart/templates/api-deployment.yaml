---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quobyte-api
spec:
  selector:
    matchLabels:
      app: quobyte-api  # has to match .spec.template.metadata.labels
  replicas: {{ .Values.quobyte.replicas.api }}  # by default is 4
  template:
    metadata:
      labels:
        app: quobyte-api  # has to match .spec.selector.matchLabels
      annotations:
        timestamp: "{{ now }}"
    spec:
      terminationGracePeriodSeconds: 10
      hostNetwork: {{ .Values.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - key: {{ .Values.taintKey }}
          operator: "Exists"
          {{- if .Values.taintValue }}
          value: {{ .Values.taintValue | quote }}
          {{- end }}
          effect: "NoSchedule"
      containers:
        - name: quobyte-api
          image: {{ .Values.quobyte.image }}
          imagePullPolicy: Always
          env:
            - name: NODENAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: QUOBYTE_DATA_PORT
              value: "7863"
            - name: QUOBYTE_META_PORT
              value: "7862"
            - name: QUOBYTE_REG_PORT
              value: "7861"
            - name: QUOBYTE_API_PORT
              value: "7860"
            - name: QUOBYTE_S3_PORT
              value: "8484"
            - name: CLOUD_INSTALL
              value: "1"
            - name: QUOBYTE_SERVICE
              value: api
            - name: QUOBYTE_REGISTRY
              value: _quobyte._tcp.quobyte.{{ .Release.Namespace }}.{{ .Values.clusterDnsSuffix }}
            - name: CLUSTER_NS
              value: {{ .Release.Namespace }}
            - name: LIMIT_OPEN_FILES
              value: "{{ .Values.quobyte.maxopenfiles }}"
            - name: LIMIT_MAX_PROCESSES
              value: "{{ .Values.quobyte.maxprocs }}"
          ports:
            - containerPort: 7860
              name: quobyteapi
          {{- with .Values.quobyte.resources.api }}
          resources:
            {{- $cpuReq := "" }}
            {{- $cpuLim := "" }}
            {{- $memReq := "" }}
            {{- $memLim := "" }}
            {{- if .cpu }}
              {{- if .cpu.requests }}{{- $cpuReq = (.cpu.requests | toString) }}{{- end }}
              {{- if .cpu.limit }}{{- $cpuLim = (.cpu.limit | toString) }}{{- end }}
            {{- end }}
            {{- if .memory }}
              {{- if .memory.requests }}{{- $memReq = (.memory.requests | toString) }}{{- end }}
              {{- if .memory.limit }}{{- $memLim = (.memory.limit | toString) }}{{- end }}
            {{- end }}
            {{- if or $cpuReq $memReq }}
            requests:
              {{- if $cpuReq }}
              cpu: {{ $cpuReq | quote }}
              {{- end }}
              {{- if $memReq }}
              memory: {{ $memReq | quote }}
              {{- end }}
            {{- end }}
            {{- if or $cpuLim $memLim }}
            limits:
              {{- if $cpuLim }}
              cpu: {{ $cpuLim | quote }}
              {{- end }}
              {{- if $memLim }}
              memory: {{ $memLim | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
      {{- if .Values.nodepoolname }}
      nodeSelector:
           storage-node-pool: {{ .Values.nodepoolname }}
      {{- end }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - quobyte
            topologyKey: "kubernetes.io/hostname"
