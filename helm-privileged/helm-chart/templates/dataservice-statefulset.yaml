---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: quobyte-data
spec:
  selector:
    matchLabels:
      app: quobyte-data  # has to match .spec.template.metadata.labels
  serviceName: "quobyte-data"
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0 # Optional: default is 0, meaning all pods will be updated sequentially
  replicas: {{ .Values.quobyte.replicas.data }}
  # let some time pass to finish catch up tasks.
  minReadySeconds: 180
  template:
    metadata:
      labels:
        app: quobyte-data  # has to match .spec.selector.matchLabels
      annotations:
        timestamp: "{{ now }}"
    spec:
      terminationGracePeriodSeconds: 60
      hostNetwork: {{ .Values.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - key: {{ .Values.taintKey }}
          operator: "Exists"
          effect: "NoSchedule"
          {{- if .Values.taintValue }}
          value: {{ .Values.taintValue | quote }}
          {{- end }}
          effect: "NoSchedule"
      containers:
        - name: quobyte-data
          image: {{ .Values.quobyte.image }}
          imagePullPolicy: Always
          securityContext:
            privileged: true
          env:
            - name: SERVICE_UUID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODENAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: QUOBYTE_DATA_PORT
              value: "7863"
            - name: QUOBYTE_META_PORT
              value: "7862"
            - name: QUOBYTE_REG_PORT
              value: "7861"
            - name: QUOBYTE_API_PORT
              value: "7860"
            - name: QUOBYTE_S3_PORT
              value: "8484"
            - name: QUOBYTE_SERVICE
              value: data
            - name: CLOUD_INSTALL
              value: "1"
            - name: CLUSTER_NS
              value: {{ .Release.Namespace }}
            - name: QUOBYTE_REGISTRY
              value: _quobyte._tcp.quobyte.{{ .Release.Namespace }}.{{ .Values.clusterDnsSuffix }}
            - name: LIMIT_OPEN_FILES
              value: "{{ .Values.quobyte.maxopenfiles }}"
            - name: LIMIT_MAX_PROCESSES
              value: "{{ .Values.quobyte.maxprocs }}"
            {{- if .Values.quobyte.enable_rdma.data }}
            - name: QUOBYTE_ENABLE_RDMA
              value: "{{ .Values.quobyte.enable_rdma.data }}"
            {{- end }}
            {{- if .Values.quobyte.memory.maxmem.data }}
            - name: QUOBYTE_MAX_MEM_DATA
              value: "{{ .Values.quobyte.memory.maxmem.data }}"
            {{- end}}
            {{- if .Values.quobyte.memory.maxbuffer.data }}
            - name: QUOBYTE_MAX_BUFFER_DATA
              value: "{{ .Values.quobyte.memory.maxbuffer.data }}"
            {{- end}}
          # work around check in /opt/main
          volumeMounts:
            - name: workaround
              mountPath: /devices
            - name: dev-disk
              mountPath: /dev/disk
            - name: host-udev
              mountPath: /run/udev
##            - name: var-lib-quobyte
##              mountPath: /var/lib/quobyte
          ports:
            - containerPort: 7863
              name: quobyte-data
          {{- with .Values.quobyte.resources.data }}
          resources:
            {{- $cpuReq := "" }}
            {{- $cpuLim := "" }}
            {{- $memReq := "" }}
            {{- $memLim := "" }}
            {{- if .cpu }}
              {{- if .cpu.requests }}{{- $cpuReq = (.cpu.requests | toString) }}{{- end }}
              {{- if .cpu.limit }}{{- $cpuLim = (.cpu.limit | toString) }}{{- end }}
            {{- end }}
            {{- if .memory }}
              {{- if .memory.requests }}{{- $memReq = (.memory.requests | toString) }}{{- end }}
              {{- if .memory.limit }}{{- $memLim = (.memory.limit | toString) }}{{- end }}
            {{- end }}
            {{- if or $cpuReq $memReq }}
            requests:
              {{- if $cpuReq }}
              cpu: {{ $cpuReq | quote }}
              {{- end }}
              {{- if $memReq }}
              memory: {{ $memReq | quote }}
              {{- end }}
            {{- end }}
            {{- if or $cpuLim $memLim }}
            limits:
              {{- if $cpuLim }}
              cpu: {{ $cpuLim | quote }}
              {{- end }}
              {{- if $memLim }}
              memory: {{ $memLim | quote }}
              {{- end }}
            {{- end }}
          {{- end }}

      volumes:
        - hostPath:
            # work around check in /opt/main.sh
            path: /tmp
            type: ""
          name: workaround
        - hostPath:
            path: /dev/disk
            type: ""
          name: dev-disk
        - hostPath:
            path: /run/udev
            type: ""
          name: host-udev
##        # services need a place for a common lock file per node
##        - hostPath:
##            path: /var/lib/quobyte/
##            type: ""
##          name: var-lib-quobyte
##
      {{- if .Values.nodepoolname }}
      nodeSelector:
         storage-node-pool: {{ .Values.nodepoolname }}
      {{- end }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - quobyte-data
              topologyKey: "kubernetes.io/hostname"
