---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: quobyte-data
spec:
  selector:
    matchLabels:
      app: quobyte-data # has to match .spec.template.metadata.labels
  serviceName: "quobyte-data"
  replicas: {{ .Values.quobyte.replicas }}  
  template:
    metadata:
      labels:
        app: quobyte-data # has to match .spec.selector.matchLabels
      annotations:
        timestamp: "{{ now }}"
    spec:
      terminationGracePeriodSeconds: 10
      hostNetwork: {{ .Values.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
      - key: {{ .Values.taintKey }}
        operator: "Exists"
          #value: {{ .Values.taintValue }}
        effect: "NoSchedule"
      containers:
      - name: quobyte-data
        image: {{ .Values.quobyte.image }}
        imagePullPolicy: IfNotPresent 
        securityContext:
          privileged: true
        {{- if .Values.quobyte.enable_rdma.data }}
        command: ["/bin/sh", "-c"]
        args:
            - |
              echo "rdma.enabled=true" >> /etc/quobyte/data.cfg
              /opt/main.sh
        {{- end }}
        env:
          - name: NODENAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: MY_POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: HOST_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: QUOBYTE_DATA_PORT 
            value: "7863"
          - name: QUOBYTE_META_PORT
            value: "7862"
          - name: QUOBYTE_REG_PORT 
            value: "7861"
          - name: QUOBYTE_API_PORT
            value: "7860" 
          - name: QUOBYTE_S3_PORT
            value: "8484" 
          - name: QUOBYTE_SERVICE
            value: data
          - name: CLOUD_INSTALL
            value: "1" 
          - name: CLUSTER_NS
            value: {{ .Release.Namespace }}
          - name: QUOBYTE_REGISTRY
            value: _quobyte._tcp.quobyte.{{ .Release.Namespace }}.{{ .Values.clusterDnsSuffix }}
          - name: LIMIT_OPEN_FILES
            value: "{{ .Values.quobyte.maxopenfiles }}"
          - name: LIMIT_MAX_PROCESSES
            value: "{{ .Values.quobyte.maxprocs }}"
        # work around check in /opt/main 
        volumeMounts:
        - name: workaround
          mountPath: /devices
        - name: dev-disk 
          mountPath: /dev/disk
        - name: host-udev 
          mountPath: /run/udev
        ports:
        - containerPort: 7863
          name: quobyte-data

      volumes:
      - hostPath:
        # work around check in /opt/main 
          path: /tmp
          type: ""
        name: workaround
      - hostPath:
          path: /dev/disk
          type: ""
        name: dev-disk
      - hostPath:
          path: /run/udev
          type: ""
        name: host-udev


      {{- if .Values.nodepoolname }}
      nodeSelector:
         storage-node-pool: {{ .Values.nodepoolname }}
      {{- end }}
      affinity:
        podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - quobyte
              topologyKey: "kubernetes.io/hostname"

