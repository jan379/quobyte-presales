apiVersion: v1
kind: PersistentVolume
metadata:
  name: test-volume 
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 10Gi
  csi:
    driver: csi.quobyte.com
    # The volumeHandle refers to a tenant name and a volume name
    volumeHandle: 'My Tenant|test-volume'
  persistentVolumeReclaimPolicy: Retain
  storageClassName: quobyte-simple
