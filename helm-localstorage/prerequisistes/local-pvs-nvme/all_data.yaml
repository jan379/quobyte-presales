- apiVersion: v1
  kind: PersistentVolume
  metadata:
    labels:
      app.kubernetes.io/component: data
      app.kubernetes.io/name: quobyte-storage
      app.kubernetes.io/part-of: quobyte
      index: "0"
      node: latpoc11
      role: data
    name: pv-latpoc11-data0
  spec:
    accessModes:
    - ReadWriteOnce
    capacity:
      storage: 5800Gi
    local:
      path: /var/lib/quobyte/devices/data0
    nodeAffinity:
      required:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values:
            - latpoc11
    persistentVolumeReclaimPolicy: Retain
    storageClassName: quobyte-local
    volumeMode: Filesystem
